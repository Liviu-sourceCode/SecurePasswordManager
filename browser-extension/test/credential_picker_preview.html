<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Credential Picker Preview</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0b0f16;
      color: #e5e7eb;
      min-height: 100vh;
      display: grid;
      place-items: center;
    }
    .container {
      width: 100%;
      max-width: 420px;
      padding: 20px;
      border: 1px solid #1f2937;
      border-radius: 10px;
      background: #0f141d;
      box-shadow: 0 16px 40px rgba(0,0,0,.35);
    }
    h1 { font-size: 18px; margin: 0 0 10px; }
    label { display:block; font-size: 13px; color:#94a3b8; margin-bottom: 6px; }
    input {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #334155;
      background: #0b0f16;
      color: #e5e7eb;
      margin-bottom: 12px;
    }
    button {
      padding: 8px 14px;
      border: 1px solid #334155;
      background: #0b0f16;
      color: #e5e7eb;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    .primary { border-color:#4f46e5; color:#c7d2fe; font-weight:600; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Login Form (Preview)</h1>
    <form id="login-form">
      <label for="username">Email or Username</label>
      <input type="text" id="username" name="username" placeholder="you@example.com" autocomplete="username" />
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" />
      <div style="display:flex; gap: 8px; justify-content:flex-end;">
        <button type="submit" class="primary">Sign in</button>
      </div>
    </form>
  </div>

  <script>
    // Minimal Chrome API mocks for preview
    window.chrome = {
      runtime: {
        onMessage: { addListener: function () {} },
        sendMessage: function (msg) {
          if (msg && msg.type === 'searchCredentials') {
            return Promise.resolve({
              credentials: [
                { id: '1', username: 'student@univ.ro', service_name: 'www.univ.ro', domain: 'www.univ.ro' },
                { id: '2', username: 'student2@univ.ro', service_name: 'www.univ.ro', domain: 'www.univ.ro' }
              ]
            });
          }
          if (msg && msg.type === 'getCredentialPassword') {
            return Promise.resolve({ type: 'passwordResult', success: true, password: 'preview-pass-123' });
          }
          return Promise.resolve({});
        }
      },
      storage: {
        managed: { get: function (_defaults, cb) { cb({}); } },
        local: { get: function (_defaults, cb) { cb({}); } }
      }
    };
  </script>
  <!-- Load the actual content script to exercise the credential picker -->
  <script src="../content.js"></script>
</body>
</html>
