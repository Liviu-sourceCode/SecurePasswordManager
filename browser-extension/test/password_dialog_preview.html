<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Dialog Preview</title>
    <style>
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin:0; padding:24px; }
      .container { max-width: 720px; margin: 0 auto; }
      h1 { font-size: 20px; margin: 0 0 8px; }
      p { color: #555; }
      .preview-note { background:#f7faff; border:1px solid #e3edff; color:#1f3a8a; padding:12px; border-radius:8px; margin:16px 0; }
      button.preview-open { margin-top: 12px; padding:8px 14px; border:none; background:#1068eb; color:#fff; border-radius:8px; cursor:pointer; font-size:14px; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Master Password Dialog Preview</h1>
      <p>Click the button below to open the dialog and review the updated UI.</p>
      <div class="preview-note">This preview stubs Chrome APIs and encryption for demonstration.</div>
      <button class="preview-open" id="openDialog">Open Dialog</button>
    </div>

    <script>
      // Minimal stub
      window.chrome = window.chrome || {};
      chrome.runtime = chrome.runtime || { sendMessage: (payload) => console.log('Preview sendMessage:', payload) };

      // Mocked encrypt function (not real encryption in preview)
      function encryptPassword(password){
        return { data: btoa(password), key: btoa('preview-key') };
      }

      // Inject the dialog using the same structure/styles as content.js
      function createSecurePasswordDialog(message, domain){
        const existing = document.getElementById('password-manager-dialog');
        if (existing) existing.remove();

        const overlay = document.createElement('div');
        overlay.id = 'password-manager-dialog';
        overlay.style.cssText = `position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(10,12,20,.75);backdrop-filter:blur(2px);z-index:999999;display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;`;

        const dialog = document.createElement('div');
        dialog.style.cssText = `background:#0b0f16;border:1px solid #1f2937;border-radius:10px;padding:18px 18px 14px 18px;box-shadow:0 16px 40px rgba(0,0,0,.35);max-width:440px;width:calc(100% - 32px);position:relative;transform:translateY(8px);opacity:0;transition:opacity .18s ease-out, transform .18s ease-out;color:#e5e7eb;`;

        const domainLabel = domain ? `<span style="color:#94a3b8;font-size:12px;">${domain}</span>` : '';
        dialog.innerHTML = `
          <div style="margin-bottom:12px;">
            <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;">
              <h3 style="margin:0;color:#e5e7eb;font-size:16px;font-weight:600;">Password Manager</h3>
              ${domainLabel}
            </div>
            <p style="margin:6px 0 0;color:#94a3b8;font-size:13px;">${message || 'Enter your master password to unlock credentials.'}</p>
          </div>
          <div style="margin:12px 0 16px;position:relative;">
            <label for="password-input" style="display:block;color:#cbd5e1;font-size:12px;font-weight:600;margin-bottom:6px;">Master Password</label>
            <input type="password" id="password-input" aria-label="Master password" placeholder="Enter your master password" style="width:100%;padding:10px 40px 10px 10px;border:1px solid #334155;border-radius:6px;font-size:14px;box-sizing:border-box;outline:none;background:#0f141d;color:#e5e7eb;">
                <button id="toggle-visibility" type="button" aria-label="Show password" title="Show password" style="position:absolute;right:8px;top:32px;height:24px;width:24px;border:1px solid transparent;background:transparent;color:#a78bfa;cursor:pointer;font-size:14px;">👁️</button>
          </div>
          <div style="display:flex;align-items:center;justify-content:space-between;margin-top:4px;">
            <div style="color:#94a3b8;font-size:12px;">Enter to submit · Esc to cancel</div>
            <div style="display:flex;gap:8px;">
              <button id="cancel-btn" style="padding:8px 14px;border:1px solid #334155;background:#0b0f16;border-radius:6px;cursor:pointer;font-size:14px;color:#e5e7eb;">Cancel (Esc)</button>
              <button id="ok-btn" style="padding:8px 14px;border:1px solid #4f46e5;background:#0b0f16;color:#c7d2fe;border-radius:6px;cursor:pointer;font-size:14px;font-weight:600;">OK</button>
            </div>
          </div>`;

        overlay.appendChild(dialog);
        document.body.appendChild(overlay);

        const input = dialog.querySelector('#password-input');
        const okBtn = dialog.querySelector('#ok-btn');
        const cancelBtn = dialog.querySelector('#cancel-btn');
        const toggleBtn = dialog.querySelector('#toggle-visibility');
        requestAnimationFrame(() => { dialog.style.transform = 'translateY(0)'; dialog.style.opacity = '1'; });
        input.focus();
        input.addEventListener('focus', () => {
          input.style.borderColor = '#4f46e5';
          input.style.boxShadow = '0 0 0 2px rgba(79,70,229,0.20)';
        });
        input.addEventListener('blur', () => input.style.borderColor = '#334155');
        const updateOk = () => { okBtn.disabled = !input.value; okBtn.style.opacity = okBtn.disabled ? '0.6' : '1'; okBtn.style.cursor = okBtn.disabled ? 'not-allowed' : 'pointer'; };
        updateOk();
        input.addEventListener('input', updateOk);
        toggleBtn.addEventListener('click', () => {
          const hidden = input.type === 'password';
          input.type = hidden ? 'text' : 'password';
          toggleBtn.textContent = hidden ? '🙈' : '👁️';
          toggleBtn.title = hidden ? 'Hide password' : 'Show password';
          input.focus();
        });
        const ok = () => {
          const val = input.value;
          if (!val) { input.style.borderColor = '#e74c3c'; input.focus(); return; }
          overlay.remove();
          const encrypted = encryptPassword(val);
          chrome.runtime.sendMessage({ type: 'passwordPromptResponse', encrypted: true, password: encrypted.data, key: encrypted.key });
        };
        const cancel = () => { overlay.remove(); chrome.runtime.sendMessage({ type: 'passwordPromptResponse', password: null }); };
        okBtn.addEventListener('click', ok);
        cancelBtn.addEventListener('click', cancel);
        input.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); ok(); } else if (e.key === 'Escape') { e.preventDefault(); cancel(); } });
        overlay.addEventListener('click', (e) => { if (e.target === overlay) cancel(); });
      }

      document.getElementById('openDialog').addEventListener('click', () => {
        createSecurePasswordDialog('Please enter your master password to search for credentials for www.google.com', 'www.google.com');
      });
    </script>
  </body>
  </html>
