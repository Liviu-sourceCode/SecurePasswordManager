<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Manager</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 350px;
      min-height: 400px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0b0f16;
      color: #e5e7eb;
    }

    .header {
      background: #0f141d;
      border-bottom: 1px solid #1f2937;
      color: #e5e7eb;
      padding: 14px 16px;
      text-align: center;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .status {
      font-size: 12px;
      opacity: 0.9;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .status.connected {
      color: #10b981;
    }

    .status.disconnected {
      color: #ef4444;
    }

    .status.warning {
      color: #f59e0b;
    }

    .status.checking {
      color: #94a3b8;
    }

    .status.checking::before {
      content: '';
      width: 12px;
      height: 12px;
      border: 2px solid #1f2937;
      border-top: 2px solid #4f46e5;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .status.connected::before {
      content: '✓';
      color: #10b981;
      font-weight: bold;
    }

    .status.disconnected::before {
      content: '✗';
      color: #ef4444;
      font-weight: bold;
    }

    .status.warning::before {
      content: '⚠';
      color: #f59e0b;
    }

    .content {
      padding: 16px;
    }

    .section {
      margin-bottom: 20px;
    }

    .section-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #cbd5e1;
    }

    .credentials-list {
      max-height: 200px;
      overflow-y: auto;
    }

    .credential-item {
      background: #0f141d;
      border: 1px solid #1f2937;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .credential-item:hover {
      border-color: #4f46e5;
      box-shadow: 0 2px 6px rgba(79, 70, 229, 0.15);
    }

    .credential-username {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 4px;
    }

    .credential-domain {
      font-size: 12px;
      color: #94a3b8;
    }

    .button {
      background: #0b0f16;
      color: #c7d2fe;
      border: 1px solid #4f46e5;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
    }

    .button:hover {
      box-shadow: 0 0 0 2px rgba(79,70,229,0.15);
    }

    .button.secondary {
      background: #0b0f16;
      color: #e5e7eb;
      border: 1px solid #334155;
    }

    .button.secondary:hover {
      border-color: #4f46e5;
      color: #c7d2fe;
    }

    .button:disabled {
      background: #1f2937;
      color: #9ca3af;
      border-color: #1f2937;
      cursor: not-allowed;
    }

    .password-generator {
      background: #0f141d;
      border: 1px solid #1f2937;
      border-radius: 8px;
      padding: 12px;
    }

    .form-group {
      margin-bottom: 12px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 4px;
      color: #cbd5e1;
    }

    .form-group input[type="number"] {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #334155;
      border-radius: 6px;
      font-size: 14px;
      background: #0f141d;
      color: #e5e7eb;
    }

    .checkbox-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .checkbox-item {
      display: flex;
      align-items: center;
      font-size: 12px;
    }

    .checkbox-item input {
      margin-right: 4px;
    }

    .generated-password {
      background: #0f141d;
      border: 1px solid #334155;
      border-radius: 6px;
      padding: 8px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      word-break: break-all;
      margin-top: 8px;
      cursor: pointer;
      user-select: all;
      color: #93c5fd;
    }

    .empty-state {
      text-align: center;
      padding: 20px;
      color: #94a3b8;
    }

    .empty-state-icon {
      font-size: 32px;
      margin-bottom: 8px;
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #94a3b8;
    }

    .error {
      background: #1a0e12;
      border: 1px solid #7f1d1d;
      color: #fca5a5;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      margin-bottom: 12px;
    }

    .success {
      background: #0c1a12;
      border: 1px solid #14532d;
      color: #86efac;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      margin-bottom: 12px;
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #6b7280;
      font-size: 14px;
      gap: 8px;
    }

    .loading::before {
      content: '';
      width: 16px;
      height: 16px;
      border: 2px solid #e5e7eb;
      border-top: 2px solid #4f46e5;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .empty-state {
      text-align: center;
      padding: 20px;
      color: #6b7280;
      font-size: 14px;
    }

    .empty-state-icon {
      font-size: 24px;
      margin-bottom: 8px;
      opacity: 0.5;
    }

    .generated-password {
      background: #0f141d;
      border: 1px solid #334155;
      border-radius: 6px;
      padding: 8px 12px;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      margin: 8px 0;
      cursor: pointer;
      transition: all 0.2s;
      word-break: break-all;
      color: #93c5fd;
    }

    .generated-password:hover {
      border-color: #4f46e5;
      box-shadow: 0 0 0 2px rgba(79,70,229,0.15);
    }

    .generated-password.copied {
      border-color: #10b981;
      color: #8b5cf6;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Password Manager</h1>
  </div>

  <div class="content">
    <div id="errorMessage" class="error" style="display: none;"></div>
    <div id="successMessage" class="success" style="display: none;"></div>

    <!-- Current Site Credentials -->
    <div class="section">
      <div class="section-title">Credentials for this site</div>
      <div id="credentialsList">
        <div class="loading">
          <span>Loading credentials...</span>
        </div>
      </div>
    </div>

    <!-- Password Generator -->
    <!-- Removed by request: entire password generator UI -->

    <!-- Actions -->
    <!-- Removed by request: Open Password Manager button -->
  </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
